services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: leafguard
      POSTGRES_PASSWORD: leafguard
      POSTGRES_DB: leafguard
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leafguard"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
    volumes:
      - ./ml/saved_models:/code/ml/saved_models:ro
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  pgdata:
